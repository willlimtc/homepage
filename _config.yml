title: Will Li's Homepage
author: Will Li
email: luyuanli2010@gmail.com
description: | # this means to ignore newlines until "show_exerpts:"
  Hello! My name is Will Li, currently a senior **solution engineer** at the Microsoft Innovation Hub in Irvine, California, where I help enterprise customers transform their business operations through agentic AI solutions using various Microsoft technologies.
  
  My work focuses on guiding organizations across healthcare, finance, government, and manufacturing industries to unlock real business value — from streamlining enrollment operations to accelerating AI-powered workflows with measurable outcomes.
  
  I am also a PhD in Computer Science, MBA, tennis player, **hockey enthusiast**, and the proud **3rd place** finisher of the SoCal Mazda Owner Driving Singing Competition 🎤🚗 — yes, that's a real thing, and yes, I take it seriously. 😄  
show_excerpts: true # set to true to show excerpts on the homepage

